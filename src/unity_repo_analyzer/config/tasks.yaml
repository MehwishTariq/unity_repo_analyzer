crawler_task:
  description: >
    Explore the local Unity project directory at {repo} (focusing primarily on the Assets/ folder). 
    Crawl through all script directories, ignore non-code files (like .meta files, materials, prefabs, or plugins), 
    and use your mapping tools to build a structural overview of the C# classes, their inheritances 
    (e.g., MonoBehaviour, ScriptableObject), and their core methods.
  expected_output: >
    A structural map layout of all Unity C# classes, detailing their parent classes and key method interfaces.
  agent: crawler

evaluator_task:
  description: >
    Analyze the Unity C# structural map generated by the crawler_task. 
    Using your file-reading tool, read the actual contents of the key files listed in that map.
    
    If you need to analyze a script, combine the sandbox path with the script location. For example: '{repo}/Assets/Scripts/current_script.cs'.
    
    CRITICAL SYNTAX RULE FOR TOOL USE:
    When calling the 'read_a_files_content' tool, you MUST wrap every argument in double quotes 
    and provide valid JSON formatting. Example: {{"file_path": "{repo}/Assets/Scripts/current_script.cs", "start_line": 1, "line_count": 50}}
    
    Do not invent or guess paths, code, files. Evaluate how these classes connect and look for common game programming design patterns 
    (such as Singletons, ScriptableObject architectures, or State Patterns).

    Do not append your own code snippets with the file code. If there are many files summarize the evaluation for each file.
  expected_output: >
    A detailed architectural evaluation pinpointing specific Unity/C# design patterns implemented, 
    coupling concerns, and references to specific file paths.
  agent: evaluator

writer_task:
  description: >
    Review the technical analysis from the evaluator_task. Create a beautifully structured Unity Game Architecture 
    Audit Report in markdown. Ensure code examples are formatted as C# blocks and provide practical, Unity-specific 
    refactoring advice (e.g., swapping hard references for Events or using ScriptableObjects for data).
  expected_output: >
    A clean, comprehensive markdown report detailing the Unity project's code architecture health.
  agent: writer
  output_file: unity_architecture_report.md